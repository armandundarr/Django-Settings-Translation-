{% extends "polls/base.html" %}

{% block content %}
<div class="page-header">
    <h1>Anket Sonuçları</h1>
</div>

<div class="results-container glass-form">
    <h2 class="question-title">{{ question.question_text }}</h2>

    <div class="chart-wrapper" style="position: relative; height: 400px; width: 100%; margin: 2rem 0;">
        <canvas id="resultsChart"></canvas>
    </div>

    <ul class="results-list" style="display: none;">
    {% for choice in question.choice_set.all %}
        <li class="result-item" data-label="{{ choice.choice_text }}" data-votes="{{ choice.votes }}">
        </li>
    {% endfor %}
    </ul>

    <div class="share-actions" style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
        <a href="https://twitter.com/intent/tweet?text=Sizce {{ question.question_text|urlencode }} Tarafını seç!&url=http://127.0.0.1:8000{% url 'polls:detail' question.id %}" target="_blank" class="btn btn-social twitter">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.73 16h5L9 4H4z"></path><path d="M4 20l6.76-6.76"></path><path d="M20 4l-6.76 6.76"></path></svg>
            X'te Paylaş
        </a>
        <a href="https://wa.me/?text=Sizce {{ question.question_text|urlencode }} %0Ahttp://127.0.0.1:8000{% url 'polls:detail' question.id %}" target="_blank" class="btn btn-social whatsapp">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            WhatsApp'ta Paylaş
        </a>
    </div>

    <div class="form-actions" style="margin-top: 3rem;">
        <a href="{% url 'polls:index' %}" class="btn btn-secondary">Anketlere Dön</a>
        <a href="{% url 'polls:detail' question.id %}" class="btn btn-primary">
            Yorumlara Git
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const items = document.querySelectorAll('.result-item');
    const labels = [];
    const data = [];
    
    // Sort array descending to make chart look better
    let arr = [];
    items.forEach(item => {
        arr.push({
            label: item.getAttribute('data-label'),
            votes: parseInt(item.getAttribute('data-votes'))
        });
    });
    
    arr.sort((a,b) => b.votes - a.votes);
    
    // Take top 15 if there are more (World Cup is huge)
    let isTruncated = false;
    if(arr.length > 20) {
        arr = arr.slice(0, 20);
        isTruncated = true;
    }

    arr.forEach(i => {
        labels.push(i.label);
        data.push(i.votes);
    });
    
    if(isTruncated) {
        labels.push("Diğerleri");
        data.push(0);
    }

    const ctx = document.getElementById('resultsChart').getContext('2d');
    
    const bgColors = [
        'rgba(59, 130, 246, 0.7)', 'rgba(168, 85, 247, 0.7)', 'rgba(236, 72, 153, 0.7)',
        'rgba(239, 68, 68, 0.7)', 'rgba(245, 158, 11, 0.7)', 'rgba(16, 185, 129, 0.7)',
        'rgba(14, 165, 233, 0.7)', 'rgba(99, 102, 241, 0.7)', 'rgba(20, 184, 166, 0.7)',
        'rgba(249, 115, 22, 0.7)'
    ];
    
    // Expand colors for up to 20 bars
    while(bgColors.length < labels.length) { bgColors.push(...bgColors.slice(0, 10)); }

    const borderColors = bgColors.map(color => color.replace('0.7', '1'));

    new Chart(ctx, {
        type: data.length > 8 ? 'bar' : 'pie',
        data: {
            labels: labels,
            datasets: [{
                label: 'Oy Sayısı',
                data: data,
                backgroundColor: bgColors,
                borderColor: borderColors,
                borderWidth: 1,
                borderRadius: data.length > 8 ? 4 : 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: data.length <= 8,
                    position: 'bottom',
                    labels: {
                        color: getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim()
                    }
                }
            },
            scales: data.length > 8 ? {
                y: {
                    beginAtZero: true,
                    ticks: {
                        stepSize: 1,
                        color: getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim()
                    }
                },
                x: {
                    ticks: {
                        color: getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim(),
                        maxRotation: 45,
                        minRotation: 45
                    }
                }
            } : undefined
        }
    });
});
</script>
{% endblock %}
