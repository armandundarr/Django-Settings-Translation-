{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AnketPro{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <script>
        // Theme toggle – persists in localStorage
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        });
    </script>
    <style>
        :root[data-theme='light'] {
            --bg: #f5f7fa;
            --fg: #212529;
            --primary: #3b82f6;
            --card-bg: rgba(255,255,255,0.8);
        }
        :root[data-theme='dark'] {
            --bg: #1e1e2f;
            --fg: #e5e7eb;
            --primary: #818cf8;
            --card-bg: rgba(30,30,45,0.9);
        }
        body {margin:0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--fg);}
        header, footer {background: var(--primary); color:#fff; padding:1rem; text-align:center;}
        nav a {margin:0 0.5rem; color:#fff; text-decoration:none;}
        .theme-toggle {cursor:pointer;}
        .container {max-width:1200px; margin:auto; padding:1rem;}
        .card {background: var(--card-bg); border-radius:12px; padding:1rem; margin:1rem 0; box-shadow:0 4px 6px rgba(0,0,0,0.1);}
    </style>
</head>
<body>
<header>
    <h1><a href="/" style="color:#fff; text-decoration:none;">AnketPro</a></h1>
    <nav>
        <a href="/polls/">Anketler</a>
        <a href="/about/">Hakkında</a>
        <a href="/contact/">İletişim</a>
        {% if user.is_authenticated %}
            <a href="/profile/">Profil</a>
            <a href="/logout/">Çıkış</a>
        {% else %}
            <a href="/login/">Giriş</a>
            <a href="/register/">Kayıt</a>
        {% endif %}
        <span class="theme-toggle" onclick="toggleTheme()">🌓</span>
    </nav>
</header>
<main class="container">
    {% block content %}{% endblock %}
</main>
<footer>
    <p>&copy; {{ now|date:"Y" }} AnketPro – Premium Poll Platform</p>
</footer>
</body>
</html>
